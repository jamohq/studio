<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - Jamo Studio</title>
    <script>
      const t = localStorage.getItem('jamo-theme');
      if (!t || t === 'dark') document.documentElement.classList.add('dark');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./settings/index.tsx"></script>
  </body>
</html>
